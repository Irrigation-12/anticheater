<!DOCTYPE html>
<html>
<head>
  <title>Student</title>
</head>
<body>
<h2>Student Dashboard</h2>

<button onclick="begin()">Start Exam</button>
<p id="timer"></p>

<script type="module">
import { startExam, loadTimer } from "./student.js";
import { checkAuth } from "./auth.js";

checkAuth(() => {});

window.begin = async () => {
  await startExam("sampleExamId", 30);
  runTimer();
};

async function runTimer() {
  let timeLeft = await loadTimer("sampleExamId");

  setInterval(() => {
    if (timeLeft <= 0) return;
    timeLeft--;
    timer.innerText = "Time Left: " + timeLeft + " seconds";
  }, 1000);
}
</script>
</body>
</html>
