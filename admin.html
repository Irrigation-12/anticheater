<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>
<h2>Admin Dashboard</h2>

<input id="examTitle" placeholder="Exam Title">
<input id="examDuration" placeholder="Duration (minutes)">
<button onclick="create()">Create Exam</button>

<h3>Invite New Admin</h3>
<input id="inviteEmail" placeholder="Email">
<button onclick="invite()">Invite</button>

<script type="module">
import { createExam, inviteAdmin } from "./admin.js";
import { checkAuth } from "./auth.js";

checkAuth((userData) => {
  if (userData.role !== "admin") {
    alert("Not authorized");
    window.location.href = "student.html";
  }
});

window.create = () => {
  createExam(examTitle.value, parseInt(examDuration.value));
};

window.invite = () => {
  inviteAdmin(inviteEmail.value);
};
</script>
</body>
</html>
